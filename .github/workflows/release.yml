name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Dependencies
        run: npm ci

      - name: Fetch cross-architecture macOS onnxruntime-node binaries (to avoid using slow macos-13 runners)
        if: runner.os == 'macOS'
        run: |
          ONNX_VERSION=$(node -e "console.log(require('onnxruntime-node/package.json').version)")
          mkdir -p .tmp-onnx
          npm install --prefix .tmp-onnx --no-save --arch=x64 onnxruntime-node@$ONNX_VERSION
          cp -r .tmp-onnx/node_modules/onnxruntime-node/bin/napi-v3/darwin/x64 node_modules/onnxruntime-node/bin/napi-v3/darwin/


      - name: Build Standalone Executables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:binary

      - name: Sign macOS binaries
        if: runner.os == 'macOS'
        run: |
          if [ -f "bin/app-macos-arm64" ]; then codesign --force -s - bin/app-macos-arm64; fi
          if [ -f "bin/app-macos-x64" ]; then codesign --force -s - bin/app-macos-x64; fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: bin/app-*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true

      - name: Upload Binaries to Release
        uses: softprops/action-gh-release@v1
        with:
          files: bin/**/app-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
